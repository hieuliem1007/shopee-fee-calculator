<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Dream · Bảng tính phí sàn Shopee 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #FAFAF7;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }
  a { color: inherit; }
  ::selection { background: #F5B81C; color: #1A1A1A; }

  .container { max-width: 1240px; margin: 0 auto; padding: 0 28px 40px; }
  .col-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col-3 { display: grid; grid-template-columns: 1fr 0.8fr 1fr; gap: 16px; }

  @media (max-width: 1100px) {
    .col-3 { grid-template-columns: 1fr; }
  }
  @media (max-width: 760px) {
    .container { padding: 0 16px 24px; }
    .col-2 { grid-template-columns: 1fr; }
    .input-row, .charts-grid { grid-template-columns: 1fr !important; }
    h1 { font-size: 28px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#FAFAF7">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- E-Dream gold "E" mark -->
    <rect x="500" y="280" width="200" height="200" rx="44" fill="#F5B81C"/>
    <text x="600" y="430" font-family="Inter, system-ui, sans-serif"
      font-size="150" font-weight="700" fill="#1A1A1A"
      text-anchor="middle">E</text>
    <!-- Wordmark -->
    <text x="600" y="560" font-family="Inter, system-ui, sans-serif"
      font-size="40" font-weight="600" fill="#1A1A1A"
      text-anchor="middle" letter-spacing="-1">E-Dream</text>
    <text x="600" y="610" font-family="Inter, system-ui, sans-serif"
      font-size="22" font-weight="500" fill="#6B6B66"
      text-anchor="middle">Tính phí sàn Shopee</text>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="result.jsx"></script>
<script type="text/babel" src="fees-v2.jsx"></script>
<script type="text/babel" src="charts-v2.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="scenarios.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#F5B81C",
  "background": "#FAFAF7",
  "fontFamily": "Inter",
  "showRecommendation": true,
  "showCharts": true,
  "showTopFees": true,
  "density": "comfy"
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [costPrice, setCostPrice] = useState(200000);
  const [sellPrice, setSellPrice] = useState(400000);
  const [productName, setProductName] = useState('');
  const [shopType, setShopType] = useState('mall');
  const [category, setCategory] = useState('auto');
  const [taxMode, setTaxMode] = useState('hokd');
  const [mode, setMode] = useState('forward');

  const [fixedFees, setFixedFees] = useState(DEFAULT_FIXED_FEES);
  const [varFees, setVarFees] = useState(DEFAULT_VAR_FEES);

  const [scenarios, setScenarios] = useState([]);

  // Apply category to fixed-fee rate
  useEffect(() => {
    const cat = CATEGORIES.find(c => c.id === category);
    if (!cat) return;
    setFixedFees(prev => prev.map(f =>
      f.id === 'fixed' ? { ...f, rate: cat.adj } : f
    ));
  }, [category]);

  const revenue = sellPrice;
  const fixedTotal = useMemo(() =>
    fixedFees.reduce((s, f) => s + computeFee(f, revenue), 0),
    [fixedFees, revenue]);
  const varTotal = useMemo(() =>
    varFees.reduce((s, f) => s + computeFee(f, revenue), 0),
    [varFees, revenue]);
  const totalCost = costPrice + fixedTotal + varTotal;
  const profit = revenue - totalCost;
  const profitPct = revenue > 0 ? (profit / revenue) * 100 : 0;

  const onReset = () => {
    setFixedFees(DEFAULT_FIXED_FEES);
    setVarFees(DEFAULT_VAR_FEES);
  };

  useEffect(() => {
    document.body.style.background = tw.background;
    document.body.style.fontFamily = `'${tw.fontFamily}', ui-sans-serif, system-ui, sans-serif`;
  }, [tw.background, tw.fontFamily]);

  return (
    <div style={{ minHeight: '100vh', background: tw.background }}>
      <TopNav />
      <div className="container">
        <Hero mode={mode} setMode={setMode} />

        {/* Primary input card */}
        <div style={{
          background: '#fff', borderRadius: 16, border: '1px solid #EFEAE0',
          padding: 28,
          boxShadow: '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04)',
          marginBottom: 16,
        }}>
          <div className="input-row" style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr 1.4fr', gap: 18,
          }}>
            <MoneyInput label="Giá vốn" value={costPrice} onChange={setCostPrice}
              hint="Giá bạn nhập về / sản xuất" autoFocus />
            <MoneyInput label="Giá bán" value={sellPrice} onChange={setSellPrice}
              hint="Giá niêm yết trên Shopee" />
            <div>
              <label style={{ display: 'block', fontSize: 12, fontWeight: 500,
                color: '#6B6B66', marginBottom: 8 }}>
                Tên sản phẩm <span style={{ color: '#A8A89E', fontWeight: 400 }}>(để lưu lại sau)</span>
              </label>
              <input type="text" value={productName}
                onChange={(e) => setProductName(e.target.value)}
                placeholder="VD: Áo thun nam mùa hè"
                style={{
                  width: '100%', padding: '14px 16px', borderRadius: 10,
                  border: '1.5px solid #EFEAE0', background: '#FAFAF7',
                  fontSize: 15, color: '#1A1A1A', outline: 'none',
                  fontFamily: 'inherit',
                }} />
              <div style={{ fontSize: 12, color: '#8A8A82', marginTop: 8 }}>
                Tùy chọn — dùng để lưu vào lịch sử tính
              </div>
            </div>
          </div>

          <div className="input-row" style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
            gap: 16, marginTop: 20,
            paddingTop: 20, borderTop: '1px solid #F5F2EA',
          }}>
            <Select label="Loại shop" value={shopType}
              options={[
                { id: 'mall', label: 'Shop Mall' },
                { id: 'normal', label: 'Shop thường' },
              ]}
              onChange={setShopType}
              leftIcon={<Icon name="store" size={14} color="#C99A0E" />} />
            <Select label="Ngành hàng" value={category}
              options={CATEGORIES.map(c => {
                const p = +(c.adj * 100).toFixed(2);
                const s = (p % 1 === 0 ? p.toFixed(0) : p.toString()).replace('.', ',');
                return { id: c.id, label: `${c.name} (${s}%)` };
              })}
              onChange={setCategory} />
            <Select label="Hình thức kinh doanh" value={taxMode}
              options={[
                { id: 'hokd', label: 'Hộ kinh doanh (1,5%)' },
                { id: 'company', label: 'Công ty (tự khai)' },
                { id: 'personal', label: 'Cá nhân (10%)' },
              ]}
              onChange={setTaxMode} />
          </div>
        </div>

        <ResultCard revenue={revenue} costPrice={costPrice}
          feeTotal={fixedTotal + varTotal}
          profit={profit} profitPct={profitPct}
          fixedFees={fixedFees} varFees={varFees}
          onSave={() => {}} />

        {/* Side-by-side fee panels with calculation flow in middle */}
        <section style={{ marginTop: 28 }}>
          <SectionHeader
            title="Bảng phí chi tiết"
            subtitle="Bật/tắt từng khoản, dòng tiền sẽ cập nhật ngay tức thì."
            right={
              <button onClick={onReset} style={{
                background: 'transparent', border: 0, padding: '6px 0',
                color: '#6B6B66', fontSize: 13, cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'inherit',
              }}>
                <Icon name="refresh" size={13} /> Reset về mặc định
              </button>
            } />
          <div className="col-3" style={{ marginTop: 16 }}>
            <FeePanelV2 title="Chi phí cố định"
              fees={fixedFees} setFees={setFixedFees} revenue={revenue}
              color="#F5B81C" accentBg="#FAF6E8" />
            <CalcFlow revenue={revenue} costPrice={costPrice}
              fixedTotal={fixedTotal} varTotal={varTotal} profit={profit} />
            <FeePanelV2 title="Chi phí biến đổi"
              fees={varFees} setFees={setVarFees} revenue={revenue}
              color="#3B82C4" accentBg="#EAF2FB" />
          </div>
        </section>

        {tw.showCharts && (
          <section style={{ marginTop: 28 }}>
            <SectionHeader title="Phân tích trực quan"
              subtitle="Cấu trúc doanh thu và phân rã chi phí — biết khoản nào ngốn lợi nhuận." />
            <div style={{ marginTop: 16 }}>
              <DualDonuts revenue={revenue} costPrice={costPrice}
                fixedFees={fixedFees} varFees={varFees} profit={profit} />
              {tw.showTopFees && (
                <div style={{ marginTop: 16 }}>
                  <TopFeesV2 fees={[...fixedFees, ...varFees]} revenue={revenue} />
                </div>
              )}
            </div>
          </section>
        )}

        {tw.showRecommendation && (
          <RecommendationCard profit={profit} profitPct={profitPct}
            fixedFees={fixedFees} revenue={revenue} onTry={() => {}} />
        )}

        <ScenariosSection
          scenarios={scenarios}
          setScenarios={setScenarios}
          current={{
            costPrice, sellPrice, productName, shopType, category, taxMode,
            fixedFees, varFees,
          }}
          onApply={(s) => {
            const snap = s.snapshot;
            setCostPrice(snap.costPrice);
            setSellPrice(snap.sellPrice);
            setProductName(snap.productName);
            setShopType(snap.shopType);
            setCategory(snap.category);
            setTaxMode(snap.taxMode);
            setFixedFees(snap.fixedFees);
            setVarFees(snap.varFees);
          }}
        />

        <Footer />
      </div>

      <StickyBar profit={profit} profitPct={profitPct} onSave={() => {}} />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent (gold)" value={tw.accentColor}
          onChange={v => setTweak('accentColor', v)} />
        <TweakColor label="Background" value={tw.background}
          onChange={v => setTweak('background', v)} />

        <TweakSection label="Typography" />
        <TweakSelect label="Font" value={tw.fontFamily}
          options={['Inter', 'system-ui', 'Helvetica Neue', 'IBM Plex Sans']}
          onChange={v => setTweak('fontFamily', v)} />

        <TweakSection label="Sections" />
        <TweakToggle label="Hiện biểu đồ" value={tw.showCharts}
          onChange={v => setTweak('showCharts', v)} />
        <TweakToggle label="Hiện top phí lớn nhất" value={tw.showTopFees}
          onChange={v => setTweak('showTopFees', v)} />
        <TweakToggle label="Hiện gợi ý E-Dream" value={tw.showRecommendation}
          onChange={v => setTweak('showRecommendation', v)} />

        <TweakSection label="Quick states" />
        <TweakButton label="Demo: Lãi tốt"
          onClick={() => { setCostPrice(150000); setSellPrice(400000); }} />
        <TweakButton label="Demo: Hòa vốn"
          onClick={() => { setCostPrice(240000); setSellPrice(400000); }} />
        <TweakButton label="Demo: Đang lỗ"
          onClick={() => { setCostPrice(380000); setSellPrice(400000); }} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
